name: Release

# Publishes the aggregated artifact bundle to the Maven Central (Sonatype
# Central Portal) on a version tag, e.g. `git tag v0.1.0 && git push --tags`.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SIGNING_KEY            ASCII-armored PGP private key (the whole block)
#   SIGNING_PASSWORD       passphrase for that key
#   CENTRAL_PORTAL_USERNAME  Central Portal user token name  (central.sonatype.com → Account → Generate User Token)
#   CENTRAL_PORTAL_PASSWORD  Central Portal user token secret
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Publish aggregated bundle to Central Portal
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: ./gradlew publishAggregationToCentralPortal --no-configuration-cache --stacktrace
